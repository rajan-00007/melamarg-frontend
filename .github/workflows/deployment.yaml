name: Build and Deploy Frontend Service Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        id: setup_buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        id: login_harbor
        env:
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: echo $HARBOR_PASSWORD | docker login ${{ secrets.HARBOR_URL }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Set environment variables
        run: |
          echo "TAG=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
          RAW_IMAGE="${{ secrets.HARBOR_URL }}/melamarg/melamargfrontend"
          CLEAN_IMAGE=$(echo "$RAW_IMAGE" | sed -E 's|^https?://||' | tr '[:upper:]' '[:lower:]' | tr -d '\r' | tr -d ' ' | sed 's|//|/|g')
          echo "HARBOR_IMAGE=$CLEAN_IMAGE" >> $GITHUB_ENV

      - name: Build Docker image
        id: build_docker_images
        run: |
          echo "Building with TAG: ${{ env.TAG }}"
          docker build -t ${{ env.HARBOR_IMAGE }}:${{ env.TAG }} \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_VAPID_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}" \
            .

      - name: Verify Docker image
        id: verify_docker_image
        run: docker images ${{ env.HARBOR_IMAGE }}:${{ env.TAG }}

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db
          restore-keys: |
            ${{ runner.os }}-trivy-db

      - name: Trivy Scan Docker images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.HARBOR_IMAGE }}:${{ env.TAG }}
        timeout-minutes: 30

      - name: Push Docker image
        id: push_docker_images
        run: |
          docker push ${{ env.HARBOR_IMAGE }}:${{ env.TAG }}

      # CD steps start here for auto deployment
      - name: Checkout GitOps repository
        uses: actions/checkout@v5
        with:
          repository: healthligence-s/healthligence-infra
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}
          path: healthligence-infra

      - name: Update Kubernetes manifests
        run: |
          cd healthligence-infra/melamarg/melamarg-frontend

          # Configure Git
          git config --global user.email "${{ secrets.GITOPS_EMAIL }}"
          git config --global user.name "${{ secrets.GITOPS_USERNAME }}"

          # Update only the image tag in the Deployment
          sed -i "s|registry.heal.infoviz.co/.*:.*|${HARBOR_IMAGE}:${TAG}|g" melamarg-frontend.yaml

          # Commit and push changes
          git add melamarg-frontend.yaml
          git commit -m "chore: Update melamarg-frontend image tag to ${TAG}"
          git push origin main
        env:
          TAG: ${{ env.TAG }}
          HARBOR_IMAGE: ${{ env.HARBOR_IMAGE }}

      - name: Cleanup GitOps repository
        if: always()
        run: |
          rm -rf healthligence-infra

      - name: Logout from Harbor
        id: logout_harbor
        run: docker logout ${{ secrets.HARBOR_URL }}
